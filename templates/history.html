{% extends "index.html" %}
{% block content %}

<div class="topbar">
  <h1>Analysis History</h1>
  <div class="status-badge"><div class="pulse-dot"></div>Database</div>
</div>

<!-- Pie Chart -->
<div class="chart-card fade-in" style="max-width:340px; margin:0 auto 28px;">
  <div class="section-title">Wallet Category Distribution</div>
  <div style="height:260px; position:relative;">
    <canvas id="historyChart"></canvas>
  </div>
</div>

<!-- History Table -->
<div class="table-card fade-in">
  <div style="padding:16px 20px; border-bottom:1px solid var(--border);">
    <div class="section-title" style="margin-bottom:0;">Recent Analyses</div>
  </div>
  <div class="table-scroll">
    <table>
      <thead>
        <tr>
          <th>Wallet Address</th>
          <th>Category</th>
          <th>Risk Score</th>
        </tr>
      </thead>
      <tbody>
        {% for row in data %}
        <tr>
          <td>{{ row[0][:20] }}…</td>
          <td><span class="card-badge" style="font-size:11px;">{{ row[1] }}</span></td>
          <td>
            <span style="font-weight:700;
              color:{% if row[2] <= 40 %}var(--green){% elif row[2] <= 70 %}var(--yellow){% else %}var(--red){% endif %};">
              {{ row[2] }}%
            </span>
          </td>
        </tr>
        {% endfor %}
        {% if not data %}
        <tr>
          <td colspan="3" style="text-align:center; color:var(--muted); padding:24px;">No history yet.</td>
        </tr>
        {% endif %}
      </tbody>
    </table>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
var labels = [];
var values = [];
{% for item in stats %}
  labels.push("{{ item[0] }}");
  values.push({{ item[1] }});
{% endfor %}

if (labels.length > 0) {
  new Chart(document.getElementById('historyChart'), {
    type: 'pie',
    data: {
      labels: labels,
      datasets: [{
        data: values,
        backgroundColor: ['#00e676','#ff5252','#00d4ff','#ffd740','#a78bfa'],
        borderWidth: 0
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      animation: { duration: 1200 },
      plugins: {
        legend: {
          labels: { color: '#e2eaf6', padding: 16 }
        }
      }
    }
  });
} else {
  document.getElementById('historyChart').parentElement.innerHTML =
    '<p style="text-align:center;color:var(--muted);padding-top:80px;">No data yet.</p>';
}
</script>

{% endblock %}
